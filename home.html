<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOK SHOP</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    
    <header class="navbar">
        <div class="logo">
            <h2>📚 BookStream</h2>
        </div>
        <button class="btn btn-outline" id="nav-signin-btn">Sign In</button>
    </header>

    <main class="hero-container">
        
        

        <h1 class="hero-title">
            PAPA TEE AND <span class="highlighttext">MAMA TEE </span> <br> BOOK SHOP STREAM.
        </h1>

        <p class="hero-subtitle">
           Welcome to your new favorite literary escape. From timeless classics to hidden indie gems,
            we curate collections that feed your curiosity and comfort your soul.
        </p>

        <div class="cta-group">
            <button class="btn btn-primary" id="start-hosting-btn">
                Browse Categories <span class="arrow">&rarr;</span>
            </button>
            <button class="btn btn-secondary" id="hero-signin-btn">Sign In</button>
        </div>

    </main>

    <script src="index.js"></script>
</body>
</html>
