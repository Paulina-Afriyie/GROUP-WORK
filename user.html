<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStream - User Dashboard</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="back">
           
            <a href="home.html">Back home<span class="arrow">&rarr;</span></a>
        </div>
            <div class="logo">
                
                <h2>📚 BookStream</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="active">🏠 Dashboard</a>
                <a href="#">📖 My Orders</a>
                <a href="#">📊 Profile</a>
                <a href="#">⚙️ Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="Search by title, author...">
                </div>
                <div class="user-actions">
                    <button id="cart-toggle-btn" class="cart-btn">
                        🛒 Cart (<span id="cart-count">0</span>)
                    </button>
                    <div class="avatar">👤</div>
                </div>
            </header>

            <section class="categories-section">
                <h3>Categories</h3>
                <div class="category-list" id="category-tags">
                    <button class="category-chip active" data-category="all">All Books</button>
                    <button class="category-chip" data-category="fiction">Fiction</button>
                    <button class="category-chip" data-category="Text books">Text Books</button>
                    <button class="category-chip" data-category="Past-quetions">Past Questions</button>
                    <button class="category-chip" data-category="Writing books">Writing Books</button>
                  
                </div>
            </section>

            <section class="books-section">
                <h3>Explore Books</h3>
                <div class="books-grid" id="books-grid">
                    </div>
            </section>
        </main>

        <div class="cart-drawer" id="cart-drawer">
            <div class="cart-header">
                <h3>Your Shopping Cart</h3>
                <button id="close-cart-btn" class="close-btn">&times;</button>
            </div>
            <div class="cart-items" id="cart-items-container">
                <p class="empty-msg">Your cart is empty.</p>
            </div>
            <div class="purchase-history" id="purchase-history">
                <h4>Your Purchases</h4>
                <div id="purchases-list">
                    <p class="text-muted">No purchases yet.</p>
                </div>
            </div>
            <div class="cart-footer">
                <div class="total-price">Total: ₵<span id="cart-total">0.00</span></div>
                <button class="checkout-btn" id="checkout-btn">Proceed to Checkout</button>
            </div>
        </div>
        <div class="overlay" id="overlay"></div>
    </div>

    <script src="user.js"></script>
</body>
</html>
