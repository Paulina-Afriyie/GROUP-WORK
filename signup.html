<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BookShop</title>
    <link rel="stylesheet" href="index.css">
    
</head>
<body>
<div class="back">
           
            <a href="home.html">Back home<span class="arrow">&rarr;</span></a>
        </div>
    <div class="auth-container">
        
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p class="text-muted">Join our global readers community</p>
            </div>

            <form id="signup-form">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create strong password">
                </div>

                

                <button type="submit" class="auth-submit-btn">Register Account</button>
            </form>

            <div class="auth-footer">
                Already registered? <a href="login.html">Sign In here</a>
            </div>
        </div>
    </div>

    <script src="signup.js"></script>
</body>
</html>
